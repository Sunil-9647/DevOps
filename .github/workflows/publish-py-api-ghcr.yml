name: Publish FastAPI PROD Image to GHCR

on:
  push:
    branches: ["main"]
    paths:
      - "docker-learning/labs/python-fastapi-dockerfile/**"
      - ".github/workflows/publish-py-api-ghcr.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/sunil-9647/devops-py-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (TARGET=prod)
        uses: docker/build-push-action@v6
        with:
          context: docker-learning/labs/python-fastapi-dockerfile
          push: true
          build-args: |
            TARGET=prod
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
