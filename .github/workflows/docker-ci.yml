name: Docker CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Basic validation placeholder
        run: |
          echo "Validation stage started"
          test -f docker-learning/labs/day49-cache-lab/Dockerfile.good
          echo "Validation stage passed"

  build_and_push:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short commit SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -f docker-learning/labs/day49-cache-lab/Dockerfile.good \
            -t ghcr.io/sunil-9647/day54-demo:git-${{ steps.vars.outputs.short_sha }} \
            docker-learning/labs/day49-cache-lab

      - name: Push Docker image
        run: |
          docker push ghcr.io/sunil-9647/day54-demo:git-${{ steps.vars.outputs.short_sha }}

      - name: Show pushed image reference
        run: |
          echo "Pushed image: ghcr.io/sunil-9647/day54-demo:git-${{ steps.vars.outputs.short_sha }}"

