name: Docker CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Basic validation placeholder
        run: |
          echo "Validation stage started"
          test -f docker-learning/labs/day49-cache-lab/Dockerfile.good
          echo "Validation stage passed"

  build_and_push:
    runs-on: ubuntu-latest
    needs: validate

    outputs:
      image_ref: ${{ steps.image_meta.outputs.image_ref }}
      image_digest: ${{ steps.image_meta.outputs.image_digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short commit SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -f docker-learning/labs/day49-cache-lab/Dockerfile.good \
            -t ghcr.io/sunil-9647/day54-demo:git-${{ steps.vars.outputs.short_sha }} \
            docker-learning/labs/day49-cache-lab

      - name: Push Docker image
        run: |
          docker push ghcr.io/sunil-9647/day54-demo:git-${{ steps.vars.outputs.short_sha }}

      - name: Capture image metadata
        id: image_meta
        run: |
          IMAGE_REF="ghcr.io/sunil-9647/day54-demo:git-${{ steps.vars.outputs.short_sha }}"
          REPO_DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_REF")"
          IMAGE_DIGEST="${REPO_DIGEST#*@}"

          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "image_digest=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Show pushed image reference
        run: |
          echo "Pushed image: ${{ steps.image_meta.outputs.image_ref }}"
          echo "Pushed digest: ${{ steps.image_meta.outputs.image_digest }}"

  deploy_staging:
    runs-on: ubuntu-latest
    needs: build_and_push

    env:
      ENVIRONMENT: staging
      PREVIOUS_IMAGE: ghcr.io/sunil-9647/day54-demo:git-previous123

    steps:
      - name: Show deployment plan
        run: |
          echo "Environment: $ENVIRONMENT"
          echo "Previous image: $PREVIOUS_IMAGE"
          echo "New image: ${{ needs.build_and_push.outputs.image_ref }}"
          echo "New digest: ${{ needs.build_and_push.outputs.image_digest }}"

      - name: Placeholder deploy action
        run: |
          echo "Deploying exact image to $ENVIRONMENT"
          echo "This is a deployment-style placeholder step"
          echo "No real remote deployment is being performed yet"

      - name: Show rollback target
        run: |
          echo "If deployment fails, rollback target is: $PREVIOUS_IMAGE"

  verify_staging:
    runs-on: ubuntu-latest
    needs: [build_and_push, deploy_staging]

    env:
      ENVIRONMENT: staging

    steps:
      - name: Show verification target
        run: |
          echo "Verifying environment: $ENVIRONMENT"
          echo "Image under verification: ${{ needs.build_and_push.outputs.image_ref }}"
          echo "Digest under verification: ${{ needs.build_and_push.outputs.image_digest }}"

      - name: Placeholder verification checklist
        run: |
          echo "Verification checklist:"
          echo "- container state check"
          echo "- logs check"
          echo "- health check"
          echo "- endpoint check"
          echo "- dependency connectivity check"

      - name: Verification placeholder note
        run: |
          echo "This is a verification-style placeholder step"
          echo "Real remote verification is not wired in yet"
