name: Docker CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Basic validation placeholder
        run: |
          echo "Validation stage started"
          test -f docker-learning/labs/day49-cache-lab/Dockerfile.good
          echo "Validation stage passed"

  build_image:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short commit SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -f docker-learning/labs/day49-cache-lab/Dockerfile.good \
            -t day54-demo:git-${{ steps.vars.outputs.short_sha }} \
            docker-learning/labs/day49-cache-lab

      - name: Show built image
        run: docker images | grep day54-demo
